<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student HUB{% endblock %} — HvA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=7">
  </head>

  <body>
    <nav>
      <div class="nav-container">
        <a href="{{ url_for('main.index') }}" class="nav-logo">
          <img src="{{ url_for('static', filename='img/brand/logoHva.png') }}" alt="Hogeschool van Amsterdam" height="32">
        </a>

        <button class="menu-button" id="menu-open">
          &#9776;
        </button>

        <ul class="nav-links">
          <li><a href="{{ url_for('main.index') }}" class="{{ 'active' if active_page == 'home' }}">Home</a></li>
          <li><a href="/tools" class="{{ 'active' if active_page == 'tools' }}">Tools</a></li>
          <li><a href="/journey" class="{{ 'active' if active_page == 'journey' }}">Journey</a></li>
          <li><a href="/help" class="{{ 'active' if active_page == 'help' }}">Help</a></li>
        </ul>
      </div>
    </nav>

    <!-- Mobiel menu -->
    <div class="mobile-overlay" id="mobile-overlay"></div>
    <div class="mobile-drawer" id="mobile-drawer">
      <div class="drawer-header">
        <img src="{{ url_for('static', filename='img/brand/logoHva.png') }}" alt="Hogeschool van Amsterdam" height="28">
        <button class="menu-button" id="menu-close">
          &#10005;
        </button>
      </div>
      <ul class="drawer-links">
        <li><a href="{{ url_for('main.index') }}" class="{{ 'active' if active_page == 'home' }}">Home</a></li>
        <li><a href="/tools" class="{{ 'active' if active_page == 'tools' }}">Tools</a></li>
        <li><a href="/journey" class="{{ 'active' if active_page == 'journey' }}">Journey</a></li>
        <li><a href="/help" class="{{ 'active' if active_page == 'help' }}">Help</a></li>
      </ul>
    </div>

    <main>
      {% block main %}
      {% include 'partials/hva_triangles.html' %}
      <div class="main-content">
        {% block content %}{% endblock %}
      </div>
      {% endblock %}
    </main>

    <footer>
      <p>Hogeschool van Amsterdam — Creating Tomorrow</p>
    </footer>

    {% include 'partials/help_fab.html' %}
    <script src="{{ url_for('static', filename='js/menu.js') }}"></script>
  </body>
</html>
